name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  # 1) 主机端：用 gcc 构建并运行全部可运行示例
  build-and-run:
    name: Build & run (host gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compiler version
        run: gcc --version

      - name: Build all examples (-Wall -Wextra)
        run: make all

      - name: Run all examples
        run: make run

  # 2) 静态分析：cppcheck（硬门禁）+ clang-tidy（信息性）
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install analyzers
        run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy

      - name: cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
                   --std=c11 --language=c \
                   --inline-suppr \
                   --suppressions-list=.cppcheck-suppressions \
                   --error-exitcode=1 \
                   -i docs -i 19-arm-firmware-stm32 -i 20-qemu-cortex-m \
                   .

      - name: clang-tidy (informational)
        continue-on-error: true
        run: |
          find . -path ./docs -prune -o -name '*.c' -print \
            | grep -v 19-arm-firmware-stm32 | grep -v 20-qemu-cortex-m \
            | while read -r f; do
                echo "== $f =="
                clang-tidy --config-file=18-code-quality/.clang-tidy "$f" -- -std=c11 -I"$(dirname "$f")" || true
              done

  # 3) 真机固件：用 arm-none-eabi-gcc 交叉编译 STM32 固件
  build-firmware:
    name: Build STM32 firmware (arm-none-eabi-gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Toolchain version
        run: arm-none-eabi-gcc --version

      - name: Build firmware (elf/bin/hex + size)
        run: make -C 19-arm-firmware-stm32

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32f103-blinky
          path: |
            19-arm-firmware-stm32/blinky.elf
            19-arm-firmware-stm32/blinky.bin
            19-arm-firmware-stm32/blinky.hex

  # 4) 模拟器：用 QEMU 运行 Cortex-M 半主机示例并校验输出
  run-in-qemu:
    name: Run in QEMU (Cortex-M semihosting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain + QEMU
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm

      - name: Build QEMU example
        run: make -C 20-qemu-cortex-m

      - name: Run in QEMU and check output
        run: |
          out=$(timeout 30 make -s -C 20-qemu-cortex-m run || true)
          echo "$out"
          echo "$out" | grep -q "done" || { echo "QEMU 运行未看到预期输出"; exit 1; }
